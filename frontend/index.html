<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Lavanderia</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/home-style.css">
    <link rel="stylesheet" href="/styles/style.css">
    <script type="module" src="/src/view/header.js"></script>
    <script type="module" src="/src/view/footer.js"></script>
    <script type="module" src="/src/view/offcanvas.js"></script>
</head>
<body>

	
	<!--
	abaixo está a estrutura do cabeçalho, só replicar nas outras páginas (copia e cola)
	-->
	<header class="header-menu"></header>
    <main>
    	<div id="offcanvas_container"></div>

		<div id="logo-title-container">
			<figure>
				<img id="logo-home" src="/src/img/clean-lavanderia-logo-home.png">
			</figure>
			<h1 id="title-home">CLEAN LAVANDERIA</h1>
		</div>
		<div id="banner-container">
			<figure id="figure-banner">
				 <img id="banner-img" src="/src/img/happy-couple.jpg">
			</figure>
		</div>
		<hr>
		<section>
			<div id="steps-container"> 
				<div id="steps-grid">
					<figure class="step" id="step-1">
						<img class="steps-img" src="/src/img/washing-machine.png" alt="Máquina de lavar">
						<p>Lavagem com máquinas que não machucam o seu tecido</p>
					</figure>
					<figure class="step" id="step-2">
						<img class="steps-img" src="/src/img/iron.png" alt="Ferro de passar">
						<p>Roupas sem se amassarem por mais de 24 horas</p>
					</figure>
					<figure class="step" id="step-3">
						<img class="steps-img" src="/src/img/dry-cleaning.png" alt="Roupa">
						<p>Lavagem a seco de qualidade e com cuidado</p>
					</figure>
				</div>
				
			</div>
		</section>
		<hr>

		<section id="sobre-section">
			<h1>DESCUBRA SOBRE NÓS:</h1>
			<div id="circles-container">
				<button class="circle" onclick="">VANTAGENS</button>
				<button class="circle" id="mainCircle" onclick="">NOSSAS LAVANDERIAS</button>
				<button class="circle" onclick="window.open('quem-somos.html', '_self')">QUEM SOMOS</button>
			</div>
		</section>

		<section id="final-section">
			<div id="buttons-container">
				<button class="finalButton" id="goBackBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Voltar para cima</button>
				<button class="finalButton" id="franquieBtn" onclick="window.open('franquie.html', '_self')">Franquie</button>
			</div>
		</section>
	</main>
    

	
	<!---COPIA ISSO DAQUI TAMBÉM-->
    <footer class="main-footer"></footer>
</body>
</html>
