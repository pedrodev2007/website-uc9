<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realizar acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/login-style.css">
    <link rel="stylesheet" href="styles/style.css">
	<link rel="icon" type="image/x-icon" href="src/img/clean-lavanderia-favicon.png">

	<script src="./repositories/usuarios.js" defer></script>

	<script src="./js/view/gerenciamento-view.js" type="module" defer></script>
	<script src="./js/view/modal-view.js" type="module" defer></script>
    <script type="module" src="../../src/view/footer.js"></script>

	<script src="./controllers/login_usuarios.js" type="module" defer></script>
</head>
<body>
    <main>
        <section>
                <div id="login-card">
                    <div>
                        <div id="login-header">
                            <h1>Área de acesso</h1>
                        </div>
                        <div id="login-body">
                            <form id="frmUsuarios" action="GET">
                                <div class="mb-3" id="input-area">
                                    <!-- <input id="inputNome" name="nome" class="form-control" type="text" placeholder="Nome de usuário" > -->
                                    <input id="inputEmail" name="email" class="form-control" type="email" placeholder="Email" autocomplete="on" required>
                                    <input id="inputSenha" name="senha" class="form-control" type="password" placeholder="Senha" required>
                                </div>
                                <div>
                                    <p><a href="login.html">Esqueci minha senha</a></p> <!-- não funciona -->
                                    <p>Não tem uma conta ainda? <a href="cadastrar.html">Crie uma aqui</a></p>
                                </div>
                                <div id="button-area">
                                    <input id="btnLogin" class="btn btn-outline-primary" type="submit" value="Realizar login">
                                    <input class="btn btn-outline-danger" type="button" value="Cancelar" onclick="history.back()">
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
        </section>
    </main>
    <footer class="main-footer"></footer>
</body>


</html>
